<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viewer 360°</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0C0C0B; overflow: hidden; }
    #panorama { width: 100%; height: 100%; }
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #0C0C0B; z-index: 10;
    }
    #loading svg { opacity: 0.25; animation: spin 1.8s linear infinite; }
    #loading span {
      font-family: sans-serif; font-size: 11px;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: #0C0C0B; font-family: sans-serif;
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; color: rgba(255,80,80,0.6);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Esconde UI padrão do Pannellum */
    .pnlm-load-button, .pnlm-about-msg { display: none !important; }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
      stroke="rgba(184,150,110,0.8)" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3
               m9 9a9 9 0 0 1-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9
               m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9
               m-9 9a9 9 0 0 1 9-9"/>
    </svg>
    <span>Carregando 360°</span>
  </div>
  <div id="error">Erro ao carregar imagem</div>
  <div id="panorama"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var url    = params.get('url');

    if (!url) {
      document.getElementById('loading').style.display = 'none';
      var err = document.getElementById('error');
      err.style.display = 'flex';
      err.textContent   = 'URL da imagem não informada';
    } else {
      var viewer = pannellum.viewer('panorama', {
        type:        'equirectangular',
        panorama:    url,
        autoLoad:    true,
        autoRotate:  -2,
        compass:     false,
        showControls: false,
        hfov:        100,
        minHfov:     50,
        maxHfov:     120,
        onLoad: function() {
          document.getElementById('loading').style.display = 'none';
        },
        onError: function(err) {
          document.getElementById('loading').style.display = 'none';
          var el = document.getElementById('error');
          el.style.display = 'flex';
          el.textContent   = 'Erro ao carregar imagem 360°';
          console.error('Pannellum error:', err);
        }
      });
    }
  </script>
</body>
</html>
